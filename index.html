<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TurboMax VPN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background-image: url('https://pplx-res.cloudinary.com/image/upload/pplx_search_images/6ada37222eb91dd64c3d29ba755215f6e815931b.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(10,61,98,0.85) 0%, rgba(19,122,63,0.8) 50%, rgba(0,255,136,0.7) 100%);
            z-index: 1;
        }
        /* Qolgan stillar o'zgarmagan */
        .container {
            z-index: 2;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 30px 20px;
        }
        .logo {
            width: 140px;
            height: 140px;
            margin: 0 auto 25px;
            filter: drop-shadow(0 8px 20px rgba(0,255,136,0.6));
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 15px;
            text-shadow: 0 4px 12px rgba(0,0,0,0.6);
            letter-spacing: 1px;
        }
        .status-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 16px;
            margin-bottom: 20px;
            opacity: 0.95;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            animation: blink 1.5s infinite;
            box-shadow: 0 0 8px rgba(255,68,68,0.5);
        }
        .status-dot.online { 
            background: #00ff88; 
            animation: none; 
            box-shadow: 0 0 15px #00ff88; 
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }
        .expire {
            font-size: 14px;
            opacity: 0.85;
            margin-bottom: 30px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        .connect-btn {
            padding: 14px 24px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 25px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(20px);
            transition: all 0.3s;
            margin-bottom: 20px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .connect-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .buttons {
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            max-width: 320px;
            padding: 0 20px 30px;
        }
        .btn {
            padding: 18px 24px;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.6s;
        }
        .btn:active::before { left: 100%; }
        .btn:active { transform: scale(0.97); }
        .btn-podpiska {
            background: linear-gradient(135deg, #00c851 0%, #007e33 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(0,200,81,0.5);
            font-size: 18px;
        }
        .btn-podderjka {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .price {
            font-size: 22px;
            display: block;
        }
        .support-text {
            font-size: 15px;
            opacity: 0.9;
            margin-top: 4px;
        }
        .bottom-nav {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-around;
            z-index: 3;
            opacity: 0.8;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- Oldingi HTML struktura bir xil -->
    <div class="container">
        <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L3 6V18L12 22L21 18V6L12 2Z" fill="#00ff88" stroke="white" stroke-width="2"/>
            <path d="M7 9H17V15H7V9Z" fill="#ffffff" stroke="#00ff88" stroke-width="2" stroke-linejoin="round"/>
            ircle cx="12" cy="12" r="3.5" fill="#00c851" stroke="white" stroke-width="1"/>
            ircle cx="12" cy="12" r="1" fill="white"/>
        </svg>
        <h1>TurboMax VPN</h1>
        <div class="status-line">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">офлайн</span>
        </div>
        <div class="expire">до 26 февраля 2026 истекает</div>
        <button class="connect-btn" onclick="toggleVPN()">
            Соединиться
        </button>
    </div>
    <div class="buttons">
        <button class="btn btn-podpiska" onclick="Telegram.WebApp.openLink('https://www.sberbank.ru/ru/choise_bank?requisiteNumber=79990402614&bankCode=100000000111')">
            <span class="price">Подписка от 75₽</span>
        </button>
        <button class="btn btn-podderjka" onclick="Telegram.WebApp.openTelegramLink('https://t.me/Husnijan_Axi')">
            Поддержка и история
            <div class="support-text">@Husnijan_Axi</div>
        </button>
    </div>
    <div class="bottom-nav">
        <div class="nav-item">Статистика</div>
        <div class="nav-item">Профиль</div>
        <div class="nav-item">Настройки</div>
    </div>

    <!-- JavaScript bir xil -->
    <script>
        let isConnected = false;
        
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        Telegram.WebApp.MainButton.setText('Подписка').show().onClick(() => {
            Telegram.WebApp.openLink('https://www.sberbank.ru/ru/choise_bank?requisiteNumber=79990402614&bankCode=100000000111');
        });
        
        function toggleVPN() {
            isConnected = !isConnected;
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const btn = document.querySelector('.connect-btn');
            
            if (isConnected) {
                dot.classList.add('online');
                text.textContent = 'онлайн';
                btn.textContent = 'Отключиться';
                btn.style.background = 'rgba(0,200,81,0.4)';
            } else {
                dot.classList.remove('online');
                text.textContent = 'офлайн';
                btn.textContent = 'Соединиться';
                btn.style.background = 'rgba(255,255,255,0.2)';
            }
        }
        
        Telegram.WebApp.onEvent('themeChanged', function() {
            document.body.className = Telegram.WebApp.colorScheme;
        });
        
        setInterval(() => {
            if (!isConnected) {
                document.getElementById('statusDot').style.opacity = Math.random() > 0.5 ? '0.3' : '1';
            }
        }, 1500);
    </script>
</body>
</html>
